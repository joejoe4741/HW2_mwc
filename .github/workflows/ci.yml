name: Build and Push Docker Image
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Get branch name
      id: vars
      shell: powershell
      run: echo "branch=$($env:GITHUB_REF -replace 'refs/heads/','')" >> $env:GITHUB_OUTPUT
    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:buildcache,mode=max
  deploy:
    name: Deploy to Self-hosted Runner
    runs-on: self-hosted
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Pull Latest Image
      run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
    - name: Stop and Remove Existing Container
      shell: powershell
      run: docker rm -f age-prediction-api; if ($LASTEXITCODE -ne 0) { exit 0 }
    - name: Run New Container
      run: docker run -d --name age-prediction-api --restart always -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/age-prediction-api:latest
    - name: Cleanup Unused Images
      run: docker image prune -f